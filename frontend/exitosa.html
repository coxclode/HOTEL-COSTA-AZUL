<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserva confirmada — Hotel Costa Azul</title>
    <link rel="stylesheet" href="css/estilos.css">
    <style>
        .resultado-hero {
            text-align: center;
            padding: 40px 0 24px;
        }
        .resultado-icono { font-size: 72px; margin-bottom: 12px; }
        .resultado-titulo { font-size: 30px; font-weight: 800; margin-bottom: 8px; }
        .resultado-sub { color: #64748b; font-size: 15px; margin-bottom: 32px; }

        .codigo-box {
            text-align: center;
            background: linear-gradient(145deg, #0f4c81, #0b2f4f);
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 20px;
            color: #fff;
        }
        .codigo-label { font-size: 12px; color: rgba(255,255,255,.6); letter-spacing: 1.5px;
                        text-transform: uppercase; margin-bottom: 6px; }
        .codigo-valor { font-size: 34px; font-weight: 900; letter-spacing: 4px; }

        /* Tabla de pagos */
        .pagos-detalle { margin-bottom: 20px; }
        .pago-fila {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 12px 0;
            border-bottom: 1px solid #f1f5f9;
            gap: 12px;
        }
        .pago-fila:last-child { border-bottom: none; }
        .pf-izq { flex: 1; }
        .pf-metodo { font-weight: 700; color: #0f4c81; font-size: 14px; }
        .pf-meta   { font-size: 11px; color: #94a3b8; margin-top: 2px; }
        .pf-monto  { font-size: 17px; font-weight: 800; color: #166534; white-space: nowrap; }

        .totales-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 14px;
        }
        .totales-row.bold { font-weight: 800; font-size: 16px; color: #0f4c81;
                            border-top: 2px solid #e2e8f0; padding-top: 12px; margin-top: 4px; }
    </style>
</head>
<body>

<nav class="navbar">
    <a class="brand" href="index.html">Hotel Costa Azul</a>
</nav>

<div style="max-width:680px;margin:0 auto;padding:24px 24px 56px;">

    <!-- ── Stepper ── -->
    <div class="stepper">
        <div class="step"><div class="step-num">1</div><span>Buscar</span></div>
        <div class="step-line"></div>
        <div class="step"><div class="step-num">2</div><span>Seleccionar</span></div>
        <div class="step-line"></div>
        <div class="step"><div class="step-num">3</div><span>Tus datos</span></div>
        <div class="step-line"></div>
        <div class="step"><div class="step-num">4</div><span>Confirmar</span></div>
        <div class="step-line"></div>
        <div class="step active"><div class="step-num">5</div><span>Listo</span></div>
    </div>

    <!-- ── Cabecera de resultado ── -->
    <div class="resultado-hero">
        <div id="icono-resultado" class="resultado-icono"></div>
        <h1 id="titulo-resultado" class="resultado-titulo"></h1>
        <p  id="mensaje-resultado" class="resultado-sub"></p>
    </div>

    <!-- ── Código de reserva ── -->
    <div class="codigo-box">
        <div class="codigo-label">Código de reserva</div>
        <div id="codigo-reserva" class="codigo-valor">—</div>
    </div>

    <!-- ── Detalle de la reserva ── -->
    <div class="card" style="margin-bottom:20px;">
        <h3 style="font-size:13px;color:#64748b;font-weight:700;
                   letter-spacing:1px;text-transform:uppercase;margin-bottom:14px;">
            Detalle de la reserva
        </h3>
        <div class="resumen-grid">
            <div class="resumen-item">
                <span>Cliente</span><strong id="r-cliente">—</strong>
            </div>
            <div class="resumen-item">
                <span>Correo</span><strong id="r-correo">—</strong>
            </div>
            <div class="resumen-item">
                <span>Habitación</span><strong id="r-habitacion">—</strong>
            </div>
            <div class="resumen-item">
                <span>Check-in</span><strong id="r-checkin">—</strong>
            </div>
            <div class="resumen-item">
                <span>Check-out</span><strong id="r-checkout">—</strong>
            </div>
            <div class="resumen-item">
                <span>Estado reserva</span><strong id="r-estado">—</strong>
            </div>
        </div>
    </div>

    <!-- ── Detalle de pagos ── -->
    <div class="card" style="margin-bottom:20px;">
        <h3 style="font-size:13px;color:#64748b;font-weight:700;
                   letter-spacing:1px;text-transform:uppercase;margin-bottom:14px;">
            Detalle de pagos
        </h3>

        <div id="lista-pagos-exitosa" class="pagos-detalle"></div>

        <div style="padding-top:8px;">
            <div class="totales-row">
                <span style="color:#64748b;">Total reserva</span>
                <span id="total-reserva">—</span>
            </div>
            <div class="totales-row bold">
                <span>Total pagado</span>
                <span id="total-pagado">—</span>
            </div>
        </div>

        <div style="margin-top:18px;text-align:right;">
            <a id="link-pdf" class="btn btn-secondary" href="#" target="_blank" rel="noopener">
                Descargar comprobante PDF
            </a>
        </div>
    </div>

    <!-- ── Notificación correo ── -->
    <div id="correo-aviso" class="alert" style="margin-bottom:20px;"></div>

    <div style="text-align:center;">
        <a href="index.html" class="btn btn-primary" style="min-width:200px;">
            Volver al inicio
        </a>
    </div>

</div>

<script src="js/config.js"></script>
<script>
    const pagoResultado = JSON.parse(localStorage.getItem("pago_resultado") || "null");
    if (!pagoResultado) { window.location.href = "index.html"; }

    const c = pagoResultado.comprobante;
    const exitoso = c.estado_pago === "exitoso";

    // Cabecera
    document.getElementById("icono-resultado").textContent = exitoso ? "✅" : "❌";
    document.getElementById("titulo-resultado").textContent = exitoso
        ? "¡Reserva confirmada!" : "Pago rechazado";
    document.getElementById("titulo-resultado").style.color = exitoso ? "#166534" : "#991b1b";
    document.getElementById("mensaje-resultado").textContent = exitoso
        ? "Tu pago fue validado y la reserva ha sido confirmada."
        : "El pago no pudo procesarse. La reserva no fue confirmada.";

    // Código
    document.getElementById("codigo-reserva").textContent = c.codigo_reserva;

    // Detalle reserva
    document.getElementById("r-cliente").textContent    = c.cliente    || "—";
    document.getElementById("r-correo").textContent     = c.correo     || "—";
    document.getElementById("r-habitacion").textContent = c.habitacion || "—";
    document.getElementById("r-checkin").textContent    = c.checkin    || "—";
    document.getElementById("r-checkout").textContent   = c.checkout   || "—";
    document.getElementById("r-estado").textContent     = c.estado_reserva || "—";

    // Totales
    const precioTotal = parseFloat(c.precio_total || c.monto_pagado || 0);
    const totalPagado = parseFloat(c.total_pagado || c.monto_pagado || 0);
    document.getElementById("total-reserva").textContent = `S/ ${precioTotal.toFixed(2)}`;
    document.getElementById("total-pagado").textContent  = `S/ ${totalPagado.toFixed(2)}`;

    // Lista de pagos
    const nombres = {
        efectivo:       "💵 Efectivo",
        yape:           "📱 Yape",
        plin:           "📱 Plin",
        tarjeta_credito:"💳 Tarjeta Crédito",
        tarjeta_debito: "💳 Tarjeta Débito",
        transferencia:  "🏦 Transferencia",
    };

    const pagos = c.pagos || [];
    const lista = document.getElementById("lista-pagos-exitosa");

    if (pagos.length > 0) {
        lista.innerHTML = pagos.map((p, i) => {
            const metodoNom = nombres[p.metodo_pago] || p.metodo_pago;
            const codOp  = p.codigo_operacion ? `Cod: ${p.codigo_operacion}` : "";
            const numOp  = p.numero_operacion ? `N° Op: ${p.numero_operacion}` : "";
            const vuelto = p.vuelto && parseFloat(p.vuelto) > 0
                ? `Vuelto: S/ ${parseFloat(p.vuelto).toFixed(2)}` : "";
            const metaPartes = [codOp, numOp, vuelto].filter(Boolean);
            return `
                <div class="pago-fila">
                    <div class="pf-izq">
                        <div class="pf-metodo">Pago ${i+1} — ${metodoNom}</div>
                        ${metaPartes.length
                            ? `<div class="pf-meta">${metaPartes.join(" · ")}</div>` : ""}
                    </div>
                    <div class="pf-monto">S/ ${parseFloat(p.monto).toFixed(2)}</div>
                </div>`;
        }).join("");
    } else {
        // Fallback pago único (backward compat)
        const metodoNom = nombres[c.metodo_pago] || c.metodo_pago;
        lista.innerHTML = `
            <div class="pago-fila">
                <div class="pf-izq">
                    <div class="pf-metodo">${metodoNom}</div>
                    ${c.codigo_operacion
                        ? `<div class="pf-meta">Cod: ${c.codigo_operacion}</div>` : ""}
                </div>
                <div class="pf-monto">S/ ${parseFloat(c.monto_pagado || 0).toFixed(2)}</div>
            </div>`;
    }

    // PDF link
    const pdfUrl = pagoResultado.comprobante_pdf_url;
    if (pdfUrl) {
        document.getElementById("link-pdf").href = `${API_BASE}${pdfUrl}`;
    } else {
        document.getElementById("link-pdf").style.display = "none";
    }

    // Correo
    const correoAviso = document.getElementById("correo-aviso");
    if (pagoResultado.correo_enviado) {
        correoAviso.className = "alert alert-success";
        correoAviso.textContent =
            `Correo de confirmación enviado a ${c.correo}.`;
    } else {
        correoAviso.className = "alert alert-info";
        correoAviso.textContent =
            "El correo de confirmación no pudo ser enviado (servicio no configurado).";
    }

    // Limpiar localStorage
    localStorage.removeItem("reserva_hab");
    localStorage.removeItem("reserva_cliente");
    localStorage.removeItem("reserva_resultado");
    localStorage.removeItem("pago_resultado");
</script>

</body>
</html>
