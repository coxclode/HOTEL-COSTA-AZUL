<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Recepción - Hotel Costa Azul</title>
    <link rel="stylesheet" href="../css/estilos.css">
</head>
<body>

<div class="layout">

    <aside class="sidebar">
        <div class="brand">
            <div class="brand-icon">🌊</div>
            <div>
                <h2>Hotel Costa Azul</h2>
                <p>Recepcionista</p>
            </div>
        </div>
        <nav>
            <a href="../index.html">🏠 Inicio</a>
            <a href="index.html" class="active">
                🔔 Recepción
                <span id="badge-contador" class="notif-badge" style="display:none;">0</span>
            </a>
            <a href="../admin/index.html">🛏️ Habitaciones</a>
        </nav>
    </aside>

    <div class="main-content">

        <div class="topbar">
            <div>
                <h1>Panel de recepción</h1>
                <p>Visualiza y gestiona las nuevas reservas web en tiempo real.</p>
            </div>
            <div style="font-size:13px;color:#64748b;">
                Actualización automática cada 15 segundos
                <span id="ultimo-poll" style="margin-left:8px;"></span>
            </div>
        </div>

        <div id="alerta" class="alert" style="display:none;"></div>

        <!-- Panel de notificaciones -->
        <div class="card">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
                <h2 style="font-size:18px;">
                    Nuevas reservas
                    <span id="titulo-contador" style="font-size:14px;color:#64748b;font-weight:400;margin-left:8px;"></span>
                </h2>
                <button class="btn btn-secondary btn-sm" onclick="pollAhora()">Actualizar ahora</button>
            </div>

            <div id="lista-notificaciones">
                <p style="color:#64748b;text-align:center;padding:32px;">Verificando notificaciones…</p>
            </div>
        </div>

    </div>
</div>

<!-- Modal detalle de reserva (HU17 - click redirección) -->
<div id="modal-detalle"
     style="display:none;position:fixed;inset:0;background:rgba(10,22,40,.55);
            z-index:9999;align-items:center;justify-content:center;padding:24px;">
    <div style="background:#fff;border-radius:20px;padding:32px;max-width:560px;
                width:100%;box-shadow:0 24px 64px rgba(10,22,40,.3);position:relative;">
        <button onclick="cerrarModal()"
                style="position:absolute;top:16px;right:16px;background:none;border:none;
                       font-size:22px;cursor:pointer;color:#64748b;">✕</button>
        <div id="modal-cuerpo"></div>
        <div style="margin-top:24px;text-align:right;">
            <button onclick="cerrarModal()" class="btn btn-secondary btn-sm">Cerrar</button>
        </div>
    </div>
</div>

<script src="../js/config.js"></script>
<script src="../js/recepcion.js"></script>
<script>
    // Primera carga y luego polling cada 15 segundos
    pollAhora();
    setInterval(pollAhora, 15000);
</script>

</body>
</html>
