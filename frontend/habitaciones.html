<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habitaciones Disponibles — Hotel Costa Azul</title>
    <link rel="stylesheet" href="css/premium.css">
</head>
<body>

<!-- ── NAVBAR ── -->
<header class="pnav">
    <a class="pnav-brand" href="index.html">Hotel Costa Azul</a>
    <nav class="pnav-links">
        <a href="index.html">Inicio</a>
        <a href="catalogo.html">Habitaciones</a>
        <a href="personal.html">Personal</a>
    </nav>
    <div class="pnav-actions">
        <a href="catalogo.html" class="pbtn pbtn-outline">Ver catálogo</a>
    </div>
</header>

<!-- ── PAGE HEADER ── -->
<div style="background:var(--navy);padding:28px 40px;color:#fff;">
    <span style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.45);display:block;margin-bottom:4px;">Disponibilidad</span>
    <h1 style="font-size:26px;font-weight:900;">Habitaciones Disponibles</h1>
</div>

<div class="pcontainer">

    <!-- Filter bar -->
    <div class="filter-bar">
        <form class="filter-form" id="form-refinar">
            <div class="filter-field">
                <label>Check-In</label>
                <input type="date" id="checkin" required>
            </div>
            <div class="filter-field">
                <label>Check-Out</label>
                <input type="date" id="checkout" required>
            </div>
            <div class="filter-field">
                <label>Tipo de habitación</label>
                <select id="tipo">
                    <option value="">Todos los tipos</option>
                    <option value="Simple">Simple</option>
                    <option value="Doble">Doble</option>
                    <option value="Suite">Suite</option>
                </select>
            </div>
            <div class="filter-field">
                <label>Personas</label>
                <input type="number" id="personas" min="1" value="1">
            </div>
            <button type="submit" class="pbtn pbtn-dark" style="align-self:flex-end;">Actualizar búsqueda</button>
        </form>
    </div>

    <p id="info-busqueda" style="font-size:13px;color:var(--muted);font-weight:600;margin-bottom:16px;"></p>
    <div id="contenedor-resultado"></div>

</div>

<!-- ── FOOTER ── -->
<footer class="pfooter">
    <div class="pfooter-inner">
        <div class="pfooter-brand"><h2>Hotel Costa Azul</h2><p>Trujillo, Perú</p></div>
        <nav class="pfooter-links">
            <a href="index.html">Inicio</a>
            <a href="catalogo.html">Catálogo</a>
            <a href="personal.html">Acceso Personal</a>
        </nav>
        <span class="pfooter-copy">© 2026 Hotel Costa Azul</span>
    </div>
</footer>

<script src="js/config.js"></script>
<script src="js/habitaciones.js"></script>
<script>
    const params   = new URLSearchParams(window.location.search);
    const checkin  = params.get('checkin')  || '';
    const checkout = params.get('checkout') || '';
    const tipo     = params.get('tipo')     || '';
    const personas = params.get('personas') || '1';

    document.getElementById('checkin').value  = checkin;
    document.getElementById('checkout').value = checkout;
    document.getElementById('tipo').value     = tipo;
    document.getElementById('personas').value = personas;

    document.getElementById('form-refinar').addEventListener('submit', function(e) {
        e.preventDefault();
        const p = new URLSearchParams({
            checkin:  document.getElementById('checkin').value,
            checkout: document.getElementById('checkout').value,
            personas: document.getElementById('personas').value,
        });
        const t = document.getElementById('tipo').value;
        if (t) p.append('tipo', t);
        window.location.href = `habitaciones.html?${p.toString()}`;
    });

    buscarHabitaciones(checkin, checkout, tipo, personas);
</script>
</body>
</html>
